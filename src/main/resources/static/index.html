<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velociraptor Auth</title>
    <script>
        window.URL_CONFIG = {
            targetOrigin: "{{TARGET_URL}}",
            origin: "{{A10S_URL}}"
        };
    </script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --text: #1f2937;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
        }
        h1 { margin-top: 0; font-size: 1.5rem; text-align: center; color: var(--primary); }
        .btn {
            display: block;
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 1rem;
            text-align: center;
            text-decoration: none;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-outline { background: transparent; border: 1px solid #d1d5db; color: #4b5563; }
        .btn-outline:hover { background: #f9fafb; }
        
        details { border: 1px solid #e5e7eb; border-radius: 6px; padding: 0.5rem; margin-top: 1.5rem; }
        summary { font-weight: 500; cursor: pointer; color: #6b7280; padding: 0.5rem; }
        
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.25rem; }
        select, input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .divider { border-top: 1px solid #e5e7eb; margin: 1.5rem 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Ankylosaurus Auth</h1>
        
        <button class="btn btn-primary" onclick="login()">
            🔑 Enter with Passkey
        </button>

        <!--button class="btn btn-outline" onclick="goToServiceB()">
            🌐 Vai al Servizio B (Test Cookie)
        </button-->

        <div class="divider"></div>

        <button type="button" class="btn btn-primary" style="background-color: #059669;" onclick="requestDeviceRegistration()">
            ✨ Register New Device
        </button>

        <div class="form-group">
            <label for="deviceName">Device name</label>
            <input type="text" id="deviceName" placeholder="Es. MacBook Michele" required>
        </div>

        <details id="configForm">
            <summary>Advanced Options</summary>
            <div style="padding-top: 1rem;">
                <div class="form-group">
                    <label for="attachment">Authenticator Attachment</label>
                    <select id="attachment">
                        <option value="platform">Platform (TPM)</option>
                        <option value="cross-platform">Cross-Platform (USB)</option>
                        <option value="any" selected>Any</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="uv">User Verification</label>
                    <select id="uv">
                        <option value="required">Required (PIN/Bio)</option>
                        <option value="preferred" selected>Preferred</option>
                        <option value="discouraged">Discouraged</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="resident">Resident Key (Passkey)</label>
                    <select id="resident">
                        <option value="required">Required</option>
                        <option value="preferred" selected>Preferred</option>
                        <option value="discouraged">Discouraged</option>
                    </select>
                </div>
            </div>
        </details>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bowser@2.14.1/bundled.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
